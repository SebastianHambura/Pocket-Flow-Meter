name: Build and Release ESP Firmware

on:
  workflow_dispatch:   # 👈 manual "Run workflow" button
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: actions/checkout@v3
      - name: Install Rust for Xtensa
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          ldproxy: true
          buildtargets: esp32s3

      - name: Install espflash
        run: cargo install espflash --locked
        
      - name: Build firmware
        run: cargo build --bin flow-meter --release --target=xtensa-esp32s3-none-elf

      # Optional: cache cargo builds
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Espflash save-image
        run: |
          espflash save-image \
            --chip esp32s3 \
            target/xtensa-esp32s3-none-elf/release/flow-meter \
            firmware.bin \
            --merge

      - name: Create GitHub Release (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: firmware.bin
          generate_release_notes: true

      - name: Upload firmware artifact (manual runs only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: firmware.bin
